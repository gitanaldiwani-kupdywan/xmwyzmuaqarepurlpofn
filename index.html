    const ivB64 = "1APrH6sU6PVBx2Vt";
    const iterations = 250000;

    function b64ToBytes(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function deriveKey(password, salt) {
      const material = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations, hash: 'SHA-256' },
        material,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
    }

    async function unlock() {
      const error = document.getElementById('error');
      error.textContent = '';
      const password = document.getElementById('password').value;
      if (!password) {
        error.textContent = 'Podaj haslo.';
        return;
      }
      try {
        const key = await deriveKey(password, b64ToBytes(saltB64));
        const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64ToBytes(ivB64) }, key, b64ToBytes(payloadB64));
        const html = new TextDecoder().decode(decrypted);
        document.open();
        document.write(html);
        document.close();
      } catch (err) {
        error.textContent = 'Niepoprawne haslo albo uszkodzony pakiet.';
      }
    }

    document.getElementById('unlock').addEventListener('click', unlock);
    document.getElementById('password').addEventListener('keydown', (event) => { if (event.key === 'Enter') unlock(); });
